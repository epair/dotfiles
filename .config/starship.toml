add_newline = false

format = "$character $directory$git_branch${custom.git_dirty}$git_status"

[character]
format = "$symbol"
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[directory]
format = "[$path]($style) "
style = "cyan"
truncation_length = 1
truncation_symbol = ""
truncate_to_repo = false

[git_branch]
format = '[git:\(](bold blue)[$branch](red)[\) ](bold blue)'
symbol = ""

[git_status]
format = '([$ahead_behind]($style) )'
style = "yellow"
ahead = "⇡${count}"
behind = "⇣${count}"
up_to_date = ""
diverged = "⇡${ahead_count}⇣${behind_count}"

[custom.git_dirty]
command = "printf '✗'"
when = 'test -n "$(git status --porcelain --ignore-submodules 2>/dev/null)"'
format = "[$output]($style) "
style = "yellow"
